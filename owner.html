<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>NOX 店舗掲載 | オーナー専用</title>

<link rel="stylesheet" href="style.css">

<style>
body{
background:#000;
color:#fff;
font-family:sans-serif;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

h1{
font-size:42px;
color:#FFD700;
margin-bottom:10px;
}

.sub{
color:#bbb;
margin-bottom:40px;
}

.card{
background:#111;
border:1px solid rgba(255,215,0,.2);
border-radius:20px;
padding:25px;
margin-bottom:20px;
}

.price{
font-size:42px;
color:#FFD700;
font-weight:bold;
margin:10px 0;
}

.option{
padding:18px 0;
border-bottom:1px solid rgba(255,255,255,.08);
}

.btn{
display:inline-block;
margin-top:30px;
padding:18px 30px;
background:#FFD700;
color:#000;
font-weight:bold;
text-decoration:none;
border-radius:12px;
}

.notice{
background:#1a1500;
border:1px solid #FFD700;
padding:20px;
border-radius:20px;
margin-bottom:30px;
}

</head>

<body>

<div class="container">

<h1>NOX 店舗掲載</h1>

</p>

<h2>🎉 オープン記念キャンペーン</h2>

<p>先着100店舗限定</p>

<h2 style="color:#FFD700;">
先着20店舗

</h2>

<h2 style="color:#FFD700;">
次の80店舗
月額980円（税込）
</h2>

</div>

<div class="card">

<h2>水商売掲載</h2>

<div class="price">
4,980円〜
</div>

<p>
キャバクラ・ガールズバー・ラウンジ・スナック・コンカフェなど
</p>

</div>

<div class="card">

<h2>風俗掲載</h2>

<div class="price">
5,980円〜
</div>

<p>
メンズエステ・デリヘル・ソープなど
</p>

</div>

<div class="card">

<h2>オプション</h2>

</div>

<a class="btn" href="https://lin.ee/SbQWdjo">
LINEで掲載相談する
</a>
