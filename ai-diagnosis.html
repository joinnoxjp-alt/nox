<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>NOX TYPE | 夜の性格診断</title>
  <meta name="description" content="NOX TYPEは、あなたの夜の才能を診断するNOXオリジナル性格診断です。" />

  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(circle at top, rgba(255,215,0,.18), transparent 35%),
        radial-gradient(circle at bottom, rgba(120,70,255,.18), transparent 35%),
        #050505;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
    }

    .app{min-height:100vh}
    .screen{display:none;min-height:100vh;padding:28px 18px;align-items:center;justify-content:center}
    .screen.active{display:flex}

    .hero,.quiz-card,.result-card{
      width:100%;
      max-width:460px;
      margin:auto;
      text-align:center;
      background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.035));
      border:1px solid rgba(255,215,0,.25);
      border-radius:30px;
      padding:34px 22px;
      box-shadow:0 25px 80px rgba(0,0,0,.55);
    }

    .brand{color:#FFD700;letter-spacing:4px;font-size:13px;font-weight:bold}
    h1{font-size:44px;margin:12px 0;color:#FFD700}
    .lead{font-size:19px;line-height:1.8;color:#ddd}
    .lead span{color:#FFD700;font-weight:bold}

    .start-card{
      margin:28px 0;
      padding:22px;
      border-radius:22px;
      background:rgba(255,215,0,.08);
      border:1px solid rgba(255,215,0,.28);
    }

    .start-card strong{display:block;font-size:22px;color:#FFD700;margin:8px 0}
    .start-card small{color:#aaa}

    .main-btn,.sub-btn,.option-btn{
      width:100%;
      border:none;
      border-radius:999px;
      padding:16px 18px;
      font-size:16px;
      font-weight:bold;
      margin-top:12px;
      cursor:pointer;
    }

    .main-btn{
      background:#FFD700;
      color:#000;
      box-shadow:0 0 25px rgba(255,215,0,.35);
    }

    .sub-btn{
      background:rgba(255,255,255,.08);
      color:#FFD700;
      border:1px solid rgba(255,215,0,.25);
    }

    .count{color:#FFD700;letter-spacing:2px}
    #questionTitle{font-size:24px;line-height:1.6;margin:22px 0}
    #optionsArea{display:grid;gap:12px}

    .option-btn{
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid rgba(255,215,0,.2);
      text-align:left;
      padding-left:22px;
    }

    .option-btn:hover{background:rgba(255,215,0,.14)}

    .result-visual{
  width:100%;
  max-width:420px;
  margin:20px auto;
  border-radius:22px;
  overflow:hidden;
  border:1px solid rgba(255,215,0,.35);
  background:rgba(255,255,255,.04);
}

.result-visual img{
  width:100%;
  display:block;
  object-fit:cover;
}

.emoji{
  display:none;
}

    #resultName{
      font-size:30px;
      color:#FFD700;
      margin:12px 0;
    }

    #resultTitle{
      font-size:18px;
      color:#fff;
      margin:8px 0 18px;
    }

    .desc{
      color:#ddd;
      line-height:1.9;
      margin-bottom:20px;
    }

    .stats{
      display:grid;
      gap:10px;
      margin:20px 0;
    }

    .stats div{
      background:rgba(255,255,255,.07);
      border:1px solid rgba(255,215,0,.18);
      border-radius:14px;
      padding:12px;
      color:#eee;
    }

    .tags{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:8px;
      margin:18px 0 24px;
    }

    .tags span{
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,215,0,.1);
      border:1px solid rgba(255,215,0,.22);
      color:#FFD700;
      font-size:13px;
    }
    .type-detail{
    text-align:left;
    margin-top:40px;
    line-height:1.9;
}

.type-detail h2,
.type-detail h3,
.type-detail h4,
.type-detail .catch{
    text-align:center;
}

.type-detail ul,
.type-detail ol{
    padding-left:24px;
    margin:18px 0;
}

.type-detail li{
    margin:8px 0;
}
    .type-detail h4{
    color:#FFD700;
    font-size:22px;
    margin-top:35px;
    margin-bottom:15px;
}
    .type-detail p{
    margin:18px 0;
    color:#ddd;
}

.type-detail h2{
    font-size:38px;
    color:#FFD700;
}

.type-detail h3{
    font-size:28px;
    margin-top:10px;
}

.type-detail .catch{
    color:#FFD700;
    font-size:18px;
    margin-bottom:30px;
    font-weight:bold;
}
  </style>
</head>

<body>
  <main class="app">

    <section id="startScreen" class="screen active">
      <div class="hero">
        <p class="brand">NOX TYPE</p>
        <h1>夜の性格診断</h1>
        <p class="lead">
          20問でわかる、あなたの<br>
          <span>夜の才能タイプ。</span>
        </p>

        <div class="start-card">
          <p>診断結果は</p>
          <strong>16タイプ × 5サブタイプ</strong>
          <small>全80通り</small>
        </div>

        <button class="main-btn" onclick="startQuiz()">診断をはじめる</button>
      </div>
    </section>

    <section id="quizScreen" class="screen">
      <div class="quiz-card">
        <p id="questionCount" class="count"></p>
        <h2 id="questionTitle"></h2>
        <div id="optionsArea"></div>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <div class="result-card">
        <p class="brand">NOX TYPE RESULT</p>

        <div class="result-visual">
          <img id="resultImage" alt="NOX診断タイプ画像">
          <div id="resultEmoji" class="emoji"></div>
        </div>

        <h2 id="resultName"></h2>
        <h3 id="resultTitle"></h3>
        <p id="resultDesc" class="desc"></p>

        <div id="statsArea" class="stats"></div>
        <div id="tagArea" class="tags"></div>
        <div id="detailArea"></div>

        <button class="main-btn" onclick="shareResult()">Xでシェア</button>
        <button class="sub-btn" onclick="copyResult()">結果をコピー</button>
        <a href="index.html" class="main-btn">
あなたに合う求人を見る
</a>
        <button class="sub-btn" onclick="restartQuiz()">もう一度診断</button>
      </div>
    </section>

  </main>

 <script src="types.js"></script>
<script src="detail.js"></script>
<script src="diagnosis.js"></script> 
</body>
</html>
