<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ | NOX</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body class="register-body">
  <main class="register-page">
    <section class="register-section">
      <div class="register-card">
        <div class="register-step">
          <span>NOX MY PAGE</span>
          <h2>マイページ</h2>
          <p>ログイン中です。</p>
        </div>

        <form id="profileForm" class="nox-form">
          <label>名前
            <input type="text" id="name" placeholder="名前を入力">
          </label>

          <label>メールアドレス
            <input type="email" id="email" placeholder="example@nox.jp" readonly>
          </label>

          <label>自己紹介
            <textarea id="bio" placeholder="自己紹介を入力" rows="4"
              style="width:100%;border-radius:14px;padding:14px;background:#111;color:white;border:1px solid #c9a34a;"></textarea>
          </label>

          <button type="submit" class="gold-btn">保存する</button>
        </form>

        <hr style="border:0;border-top:1px solid rgba(201,163,74,.4);margin:28px 0;">

        <div class="register-step">
          <span>STATUS</span>
          <p>✅ ログイン済み</p>
        </div>

        <button id="logoutBtn" type="button" class="gold-btn">ログアウト</button>

        <div class="header-actions">
          <a href="../index.html" class="btn ghost">トップへ戻る</a>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { auth } from "./firebase.js";
    import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const db = getFirestore();

    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const bioInput = document.getElementById("bio");

    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        location.href = "./login.html";
        return;
      }

      emailInput.value = user.email || "";

      const ref = doc(db, "users", user.uid);
      const snap = await getDoc(ref);

      if (snap.exists()) {
        const data = snap.data();
        nameInput.value = data.name || data.nickname || "";
        bioInput.value = data.bio || data.selfPr || "";
      }
    });

    document.getElementById("profileForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const user = auth.currentUser;
      if (!user) {
        alert("ログインしてください");
        return;
      }

      await setDoc(doc(db, "users", user.uid), {
        name: nameInput.value,
        email: emailInput.value,
        bio: bioInput.value,
        updatedAt: serverTimestamp()
      }, { merge: true });

      alert("プロフィールを保存しました。");
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      location.href = "../index.html";
    });
  </script>
</body>
</html>
