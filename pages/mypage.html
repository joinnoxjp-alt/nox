<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ | NOX</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body class="register-body">
  <main class="register-page">
    <section class="register-section">
      <div class="register-card">
        <div class="register-step">
          <span>NOX MY PAGE</span>
          <h2>マイページ</h2>
          <p>ログイン中です。</p>
        </div>

        <button id="logoutBtn" type="button" class="gold-btn">ログアウト</button>

        <div class="header-actions">
          <a href="../index.html" class="btn ghost">トップへ戻る</a>
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBA8__C8pboCIjcPEwLWQL71juZeMMBti14",
      authDomain: "noxa-b8f1a.firebaseapp.com",
      projectId: "noxa-b8f1a",
      storageBucket: "noxa-b8f1a.firebasestorage.app",
      messagingSenderId: "679949162566",
      appId: "1:679949162566:web:94a613ef0392798c57d247"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      location.href = "../index.html";
    });
  </script>
</body>
</html>
