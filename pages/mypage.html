<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ | NOX</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body class="register-body">
  <main class="register-page">
    <section class="register-section">
      <div class="register-card">
        <div class="register-step">
          <span>NOX MY PAGE</span>
          <h2>マイページ</h2>
          <p>ログイン中です。</p>
        </div>

        <div style="text-align:center; margin:24px 0;">
          <img id="profilePreview" src="" alt="プロフィール画像"
            style="width:110px;height:110px;border-radius:50%;object-fit:cover;border:1px solid #c9a34a;background:#111;display:none;margin:0 auto 12px;">
          
          <input type="file" id="profileImage" accept="image/*" style="display:none;">
          <button type="button" class="btn ghost" onclick="document.getElementById('profileImage').click()">
            写真をアップロード
          </button>
        </div>

        <form id="profileForm" class="nox-form">
          <label>
            名前
            <input type="text" id="name" placeholder="名前を入力">
          </label>

          <label>
            メールアドレス
            <input type="email" id="email" placeholder="example@nox.jp">
          </label>

          <label>
            自己紹介
            <textarea id="bio" placeholder="自己紹介を入力" rows="4"
              style="width:100%;border-radius:14px;padding:14px;background:#111;color:white;border:1px solid #c9a34a;"></textarea>
          </label>

          <button type="submit" class="gold-btn">保存する</button>
        </form>

        <hr style="border:0;border-top:1px solid rgba(201,163,74,.4);margin:28px 0;">

        <div class="register-step">
          <span>STATUS</span>
          <p>✅ ログイン済み</p>
        </div>

        <div class="register-step">
          <span>お気に入り</span>
          <p>現在0件</p>
        </div>

        <div class="register-step">
          <span>応募履歴</span>
          <p>まだ応募はありません</p>
        </div>

        <div class="register-step">
          <span>COMING SOON</span>
          <p>店舗予約・チャット・ポイント機能を準備中</p>
        </div>

        <button id="logoutBtn" type="button" class="gold-btn">ログアウト</button>

        <div class="header-actions">
          <a href="../index.html" class="btn ghost">トップへ戻る</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    const nameInput = document.getElementById("name");
    const emailInput = document.getElementById("email");
    const bioInput = document.getElementById("bio");
    const imageInput = document.getElementById("profileImage");
    const preview = document.getElementById("profilePreview");

    nameInput.value = localStorage.getItem("noxName") || "";
    emailInput.value = localStorage.getItem("noxEmail") || "";
    bioInput.value = localStorage.getItem("noxBio") || "";

    const savedImage = localStorage.getItem("noxProfileImage");
    if (savedImage) {
      preview.src = savedImage;
      preview.style.display = "block";
    }

    imageInput.addEventListener("change", () => {
      const file = imageInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = () => {
        localStorage.setItem("noxProfileImage", reader.result);
        preview.src = reader.result;
        preview.style.display = "block";
      };
      reader.readAsDataURL(file);
    });

    document.getElementById("profileForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const user = auth.currentUser;
  if (!user) {
    alert("ログインしてください");
    return;
  }

  await setDoc(doc(db, "users", user.uid), {
    name: nameInput.value,
    email: emailInput.value,
    bio: bioInput.value,
    profileImage: preview.src || "",
    updatedAt: serverTimestamp()
  }, { merge: true });

  alert("プロフィールを保存しました。");
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  location.href = "../index.html";
});

  </script>
</body>
</html>
