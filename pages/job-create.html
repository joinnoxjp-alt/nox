<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>NOX | 求人掲載申請</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Helvetica Neue",
        sans-serif;
    }

    body {
      min-height: 100vh;
      padding: 25px;
      color: #fff;
      background:
        radial-gradient(
          circle at top,
          rgba(212, 175, 55, 0.12),
          transparent 32%
        ),
        #050505;
    }

    .page {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
    }

    .logo {
      margin-bottom: 8px;
      color: #d4af37;
      font-size: 56px;
      font-weight: 900;
      letter-spacing: 4px;
    }

    .sub {
      margin-bottom: 30px;
      color: #999;
      font-size: 18px;
    }

    .card {
      margin-bottom: 28px;
      padding: 24px;
      background: #141414;
      border: 1px solid #2c2c2c;
      border-radius: 22px;
    }

    .section-title {
      margin-bottom: 20px;
      color: #d4af37;
      font-size: 22px;
      font-weight: bold;
    }

    label {
      display: block;
      margin-top: 18px;
      margin-bottom: 8px;
      color: #ddd;
      font-weight: 600;
    }

    .required {
      margin-left: 6px;
      color: #d4af37;
      font-size: 12px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px;
      color: #fff;
      background: #080808;
      border: 1px solid #333;
      border-radius: 14px;
      outline: none;
      font-size: 16px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #d4af37;
      box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.1);
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    small {
      display: block;
      margin-top: 8px;
      color: #888;
      line-height: 1.7;
    }

    #imagePreview {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 16px;
    }

    .preview-item {
      position: relative;
      overflow: hidden;
      aspect-ratio: 1 / 1;
      background: #080808;
      border: 1px solid #333;
      border-radius: 12px;
    }

    .preview-item img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .preview-number {
      position: absolute;
      top: 6px;
      left: 6px;
      display: grid;
      place-items: center;
      min-width: 24px;
      height: 24px;
      padding: 0 6px;
      color: #000;
      background: #d4af37;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .submit-button {
      width: 100%;
      margin-top: 4px;
      padding: 18px;
      color: #000;
      background: linear-gradient(135deg, #f0d46a, #b88a16);
      border: none;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(212, 175, 55, 0.18);
      cursor: pointer;
      font-size: 18px;
      font-weight: bold;
    }

    .submit-button:active {
      transform: scale(0.98);
    }

    .submit-button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .application-note {
      margin: 28px 0 50px;
      padding: 24px 16px;
      color: #9d9d9d;
      background: rgba(212, 175, 55, 0.08);
      border: 1px solid rgba(212, 175, 55, 0.25);
      border-radius: 18px;
      text-align: center;
      font-size: 14px;
      line-height: 1.9;
    }

    .message {
      display: none;
      margin-bottom: 24px;
      padding: 16px;
      border-radius: 14px;
      line-height: 1.7;
    }

    .message.show {
      display: block;
    }

    .message.success {
      color: #d9ffd9;
      background: rgba(67, 160, 71, 0.18);
      border: 1px solid rgba(67, 160, 71, 0.45);
    }

    .message.error {
      color: #ffd4d4;
      background: rgba(220, 53, 69, 0.16);
      border: 1px solid rgba(220, 53, 69, 0.45);
    }

    @media (max-width: 520px) {
      body {
        padding: 20px 14px;
      }

      .logo {
        font-size: 48px;
      }

      .card {
        padding: 20px 16px;
      }

      #imagePreview {
        gap: 7px;
      }
    }
  </style>
</head>

<body>
  <main class="page">

    <div class="logo">NOX</div>
    <div class="sub">掲載情報入力フォーム</div>

    <div id="formMessage" class="message"></div>

    <form id="jobApplicationForm">

      <section class="card">
        <div class="section-title">■ 基本情報</div>

        <label for="storeName">
          店舗名
          <span class="required">必須</span>
        </label>

        <input
          id="storeName"
          type="text"
          placeholder="例：店舗名"
          required
        >

        <label for="businessType">
          業種
          <span class="required">必須</span>
        </label>

        <select id="businessType" required>
          <option value="ガールズバー">ガールズバー</option>
          <option value="キャバクラ">キャバクラ</option>
          <option value="コンカフェ">コンカフェ</option>
          <option value="ラウンジ">ラウンジ</option>
          <option value="スナック">スナック</option>
          <option value="クラブ">クラブ</option>
          <option value="メンズコンカフェ">メンズコンカフェ</option>
          <option value="ホストクラブ">ホストクラブ</option>
          <option value="バー">バー</option>
          <option value="その他">その他</option>
        </select>

        <input
          id="otherBusinessType"
          type="text"
          placeholder="例：その他の業種名"
          style="display:none; margin-top:12px;"
        >

        <label for="area">
          エリア
          <span class="required">必須</span>
        </label>

        <input
          id="area"
          type="text"
          placeholder="例：東京都○○区"
          required
        >

        <label for="address">店舗住所</label>

        <input
          id="address"
          type="text"
          placeholder="例：東京都○○区○○1-2-3"
        >

        <label for="station">最寄駅</label>

        <input
          id="station"
          type="text"
          placeholder="例：○○駅 徒歩5分"
        >

        <label for="businessHours">営業時間</label>

        <input
          id="businessHours"
          type="text"
          placeholder="例：20:00〜LAST"
        >

        <label for="closedDay">定休日</label>

        <input
          id="closedDay"
          type="text"
          placeholder="例：日曜日"
        >
      </section>

      <section class="card">
        <div class="section-title">■ 求人情報</div>

        <label for="salary">
          時給
          <span class="required">必須</span>
        </label>

        <input
          id="salary"
          type="text"
          placeholder="例：時給3,500円〜"
          required
        >

        <label for="back">各種バック</label>

        <input
          id="back"
          type="text"
          placeholder="例：ドリンクバック・ボトルバックあり"
        >

        <label for="dailyPay">日払い</label>

        <select id="dailyPay">
          <option value="あり">あり</option>
          <option value="なし">なし</option>
        </select>

        <label for="trial">体験入店</label>

        <select id="trial">
          <option value="可能">可能</option>
          <option value="不可">不可</option>
        </select>

        <label for="beginner">未経験歓迎</label>

        <select id="beginner">
          <option value="はい">はい</option>
          <option value="いいえ">いいえ</option>
        </select>

        <label for="age">採用年齢</label>

        <input
          id="age"
          type="text"
          placeholder="例：18歳〜35歳"
        >

        <label for="quota">ノルマ</label>

        <select id="quota">
          <option value="なし">なし</option>
          <option value="あり">あり</option>
        </select>

        <label for="penalty">ペナルティ</label>

        <select id="penalty">
          <option value="なし">なし</option>
          <option value="あり">あり</option>
        </select>

        <label for="shift">シフト</label>

        <input
          id="shift"
          type="text"
          placeholder="例：自由シフト・週1日からOK"
        >
      </section>

      <section class="card">
        <div class="section-title">■ お店について</div>

        <label for="shopPR">お店のPR</label>

        <textarea
          id="shopPR"
          placeholder="例：未経験の方も安心して働ける、明るく働きやすいお店です。"
        ></textarea>

        <label for="atmosphere">お店の雰囲気</label>

        <textarea
          id="atmosphere"
          placeholder="例：スタッフ同士の仲が良く、明るくアットホームな雰囲気です。"
        ></textarea>

        <label for="customerBase">客層</label>

        <input
          id="customerBase"
          type="text"
          placeholder="例：幅広い年代のお客様が来店されます"
        >

        <label for="staffCount">在籍人数</label>

        <input
          id="staffCount"
          type="text"
          placeholder="例：20名"
        >

        <label for="ageGroup">キャスト年齢層</label>

        <input
          id="ageGroup"
          type="text"
          placeholder="例：20歳〜30歳"
        >
      </section>

      <section class="card">
        <div class="section-title">■ 掲載用画像</div>

        <label for="jobImages">
          店舗写真（最大9枚）
        </label>

        <input
          id="jobImages"
          type="file"
          accept="image/*"
          multiple
        >

        <small>
          店内・外観・ロゴ・求人画像などを最大9枚まで選択できます。<br>
          1枚目の画像が求人一覧と詳細ページのメイン画像になります。<br>
          画像なしでも申請できます。
        </small>

        <div id="imagePreview"></div>
      </section>

      <section class="card">
        <div class="section-title">■ SNS・連絡先</div>

        <small>
          SNSやホームページがない場合は、空欄または「なし」「準備中」と入力できます。
        </small>

        <label for="website">ホームページ</label>

        <input
          id="website"
          type="text"
          placeholder="URL・なし・準備中"
        >

        <label for="instagram">Instagram</label>

        <input
          id="instagram"
          type="text"
          placeholder="URL・なし・準備中"
        >

        <label for="tiktok">TikTok</label>

        <input
          id="tiktok"
          type="text"
          placeholder="URL・なし・準備中"
        >

        <label for="twitter">X（Twitter）</label>

        <input
          id="twitter"
          type="text"
          placeholder="URL・なし・準備中"
        >

        <label for="officialLine">公式LINE</label>

        <input
          id="officialLine"
          type="text"
          placeholder="URL・なし・準備中"
        >

        <label for="applicationPhone">応募用電話番号</label>

        <input
          id="applicationPhone"
          type="tel"
          placeholder="例：03-0000-0000"
        >
      </section>

      <section class="card">
        <div class="section-title">■ 担当者様</div>

        <label for="contactName">
          ご担当者名
          <span class="required">必須</span>
        </label>

        <input
          id="contactName"
          type="text"
          placeholder="例：ご担当者名"
          required
        >

        <label for="contactInfo">
          ご連絡先
          <span class="required">必須</span>
        </label>

        <input
          id="contactInfo"
          type="text"
          placeholder="例：090-0000-0000 または example@example.com"
          required
        >
      </section>

      <button
        id="submitButton"
        class="submit-button"
        type="submit"
      >
        📤 掲載申請する
      </button>

    </form>

    <div class="application-note">
      掲載申請後、NOX運営にて内容を確認し、<br>
      承認完了後に求人ページへ公開されます。
    </div>

  </main>

  <script type="module">
    import { app, db } from "./firebase-db.js";

    import {
      collection,
      addDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    import {
      getStorage,
      ref as storageRef,
      uploadBytes,
      getDownloadURL
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const storage = getStorage(app);

    const form =
      document.getElementById("jobApplicationForm");

    const submitButton =
      document.getElementById("submitButton");

    const businessType =
      document.getElementById("businessType");

    const otherBusinessType =
      document.getElementById("otherBusinessType");

    const jobImages =
      document.getElementById("jobImages");

    const imagePreview =
      document.getElementById("imagePreview");

    const formMessage =
      document.getElementById("formMessage");

    function getValue(id) {
      const element = document.getElementById(id);

      if (!element) {
        return "";
      }

      return element.value.trim();
    }

    function showMessage(message, type) {
      formMessage.textContent = message;
      formMessage.className = `message show ${type}`;

      formMessage.scrollIntoView({
        behavior: "smooth",
        block: "center"
      });
    }

    function hideMessage() {
      formMessage.textContent = "";
      formMessage.className = "message";
    }

    function toggleOtherBusiness() {
      const isOther =
        businessType.value === "その他";

      otherBusinessType.style.display =
        isOther ? "block" : "none";

      otherBusinessType.required = isOther;

      if (!isOther) {
        otherBusinessType.value = "";
      }
    }

    businessType.addEventListener(
      "change",
      toggleOtherBusiness
    );

    toggleOtherBusiness();

    jobImages.addEventListener("change", () => {
      hideMessage();
      imagePreview.innerHTML = "";

      const files =
        Array.from(jobImages.files);

      if (files.length > 9) {
        jobImages.value = "";

        showMessage(
          "掲載画像は最大9枚まで選択できます。",
          "error"
        );

        return;
      }

      files.forEach((file, index) => {
        const reader = new FileReader();

        reader.addEventListener("load", () => {
          const previewItem =
            document.createElement("div");

          previewItem.className = "preview-item";

          const image =
            document.createElement("img");

          image.src = reader.result;
          image.alt = `掲載画像 ${index + 1}`;

          const number =
            document.createElement("span");

          number.className = "preview-number";

          number.textContent =
            index === 0
              ? "メイン"
              : String(index + 1);

          previewItem.appendChild(image);
          previewItem.appendChild(number);
          imagePreview.appendChild(previewItem);
        });

        reader.readAsDataURL(file);
      });
    });

    function safeFileName(fileName) {
      const cleanedName = fileName
        .replace(/\s+/g, "_")
        .replace(/[^\w.\-ぁ-んァ-ヶ一-龠]/g, "");

      return cleanedName || "image.jpg";
    }

    async function uploadJobImages(files) {
      const imageUrls = [];

      for (
        let index = 0;
        index < files.length;
        index += 1
      ) {
        const imageFile = files[index];

        const uniqueName =
          `${Date.now()}_${index}_${safeFileName(imageFile.name)}`;

        const imageReference = storageRef(
          storage,
          `jobs/${uniqueName}`
        );

        await uploadBytes(
          imageReference,
          imageFile
        );

        const imageUrl =
          await getDownloadURL(imageReference);

        imageUrls.push(imageUrl);
      }

      return imageUrls;
    }

    form.addEventListener(
      "submit",
      async (event) => {
        event.preventDefault();
        hideMessage();

        if (!form.checkValidity()) {
          form.reportValidity();
          return;
        }

        const files =
          Array.from(jobImages.files);

        if (files.length > 9) {
          showMessage(
            "掲載画像は最大9枚まで選択できます。",
            "error"
          );

          return;
        }

        if (
          businessType.value === "その他" &&
          !otherBusinessType.value.trim()
        ) {
          showMessage(
            "その他の業種名を入力してください。",
            "error"
          );

          otherBusinessType.focus();
          return;
        }

        submitButton.disabled = true;

        submitButton.textContent =
          files.length > 0
            ? "画像をアップロードしています..."
            : "掲載情報を送信しています...";

        try {
          const imageUrls =
            await uploadJobImages(files);

          submitButton.textContent =
            "掲載情報を送信しています...";

          const selectedBusinessType =
            businessType.value === "その他"
              ? otherBusinessType.value.trim()
              : businessType.value;

          const applicationData = {
            storeName: getValue("storeName"),
            businessType: selectedBusinessType,

            area: getValue("area"),
            address: getValue("address"),
            station: getValue("station"),
            businessHours: getValue("businessHours"),
            closedDay: getValue("closedDay"),

            salary: getValue("salary"),
            salaryText: getValue("salary"),
            back: getValue("back"),
            dailyPay: getValue("dailyPay"),
            trial: getValue("trial"),
            beginner: getValue("beginner"),
            age: getValue("age"),
            quota: getValue("quota"),
            penalty: getValue("penalty"),
            shift: getValue("shift"),

            shopPR: getValue("shopPR"),
            atmosphere: getValue("atmosphere"),
            customerBase: getValue("customerBase"),
            staffCount: getValue("staffCount"),
            ageGroup: getValue("ageGroup"),

            website: getValue("website"),
            instagram: getValue("instagram"),
            tiktok: getValue("tiktok"),
            twitter: getValue("twitter"),
            officialLine: getValue("officialLine"),
            applicationPhone:
              getValue("applicationPhone"),

            contactName: getValue("contactName"),
            contactInfo: getValue("contactInfo"),

            images: imageUrls,
            image: imageUrls[0] || "",
            mainImage: imageUrls[0] || "",
            imageUrl: imageUrls[0] || "",

            status: "pending",
            createdAt: serverTimestamp()
          };

          await addDoc(
            collection(db, "jobApplications"),
            applicationData
          );

          form.reset();
          imagePreview.innerHTML = "";
          toggleOtherBusiness();

          showMessage(
            "掲載申請を受け付けました。NOX運営で確認後、承認手続きを進めます。",
            "success"
          );

        } catch (error) {
          console.error(
            "掲載申請エラー:",
            error
          );

          showMessage(
            `掲載申請に失敗しました。${error.message || "時間を置いて再度お試しください。"}`,
            "error"
          );

        } finally {
          submitButton.disabled = false;
          submitButton.textContent =
            "📤 掲載申請する";
        }
      }
    );
  </script>
</body>
</html>
