<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOX | 求人掲載申請</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
}

body{
    background:#050505;
    color:white;
    padding:25px;
}

.logo{
    font-size:56px;
    font-weight:900;
    color:#d4af37;
    margin-bottom:8px;
}

.sub{
    color:#999;
    margin-bottom:30px;
    font-size:18px;
}

.card{
    background:#141414;
    border:1px solid #2c2c2c;
    border-radius:22px;
    padding:24px;
    margin-bottom:28px;
}

.section-title{
    color:#d4af37;
    font-size:22px;
    font-weight:bold;
    margin-bottom:20px;
}

label{
    display:block;
    margin-top:18px;
    margin-bottom:8px;
    color:#ddd;
    font-weight:600;
}

input,
select,
textarea{
    width:100%;
    background:#080808;
    color:white;
    border:1px solid #333;
    border-radius:14px;
    padding:14px;
    font-size:16px;
}

textarea{
    min-height:130px;
    resize:vertical;
}

small{
    color:#888;
    display:block;
    margin-top:6px;
}

button{
    width:100%;
    background:#d4af37;
    color:#000;
    border:none;
    border-radius:16px;
    padding:18px;
    font-size:18px;
    font-weight:bold;
    margin-top:30px;
}

</style>

<script type="module">
import { app, db } from "./firebase-db.js";

import {
  collection,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const storage = getStorage(app);

window.db = db;
window.storage = storage;

window.collection = collection;
window.addDoc = addDoc;
window.serverTimestamp = serverTimestamp;

window.storageRef = ref;
window.uploadBytes = uploadBytes;
window.getDownloadURL = getDownloadURL;
</script>
</head>

<body>

<div class="logo">NOX</div>
<div class="sub">掲載情報入力フォーム</div>

<div class="card">

<div class="section-title">
■ 基本情報
</div>

<label>店舗名</label>
<input id="storeName" type="text" placeholder="例：Girls Bar NOX 新宿店">

<label>業種</label>

<select id="businessType" onchange="toggleOtherBusiness()">
  <option>ガールズバー</option>
  <option>キャバクラ</option>
  <option>コンカフェ</option>
  <option>ラウンジ</option>
  <option>スナック</option>
  <option>クラブ</option>
  <option>メンズコンカフェ</option>
  <option>ホストクラブ</option>
  <option>バー</option>
  <option>その他</option>
</select>

<input
  type="text"
  id="otherBusinessType"
  placeholder="例：その他の業種を入力"
  style="display:none;margin-top:12px;"
>

<label>エリア</label>
<input id="area" type="text" placeholder="例：東京都新宿区">

<label>店舗住所</label>
<input id="address" type="text" placeholder="例：東京都新宿区歌舞伎町1-○-○">

<label>最寄駅</label>
<input id="station" type="text" placeholder="例：JR新宿駅 徒歩5分">

<label>営業時間</label>
<input id="businessHours" type="text" placeholder="例：20:00〜LAST">

<label>定休日</label>
<input id="closedDay" type="text" placeholder="例：日曜日">

</div>
<div class="card">

<div class="section-title">
■ 求人情報
</div>

<label>時給</label>
<input id="salary" type="text" placeholder="例：時給3,500円〜">

<label>各種バック</label>
<input id="back" type="text" placeholder="例：ドリンクバック・ボトルバックあり">

<label>日払い</label>
<select id="dailyPay">
  <option>あり</option>
  <option>なし</option>
</select>

<label>体験入店</label>
<select id="trial">
  <option>可能</option>
  <option>不可</option>
</select>

<label>未経験歓迎</label>
<select id="beginner">
  <option>はい</option>
  <option>いいえ</option>
</select>

<label>採用年齢</label>
<input id="age" type="text" placeholder="例：18歳〜35歳">

<label>ノルマ</label>
<select id="quota">
  <option>なし</option>
  <option>あり</option>
</select>

<label>ペナルティ</label>
<select id="penalty">
  <option>なし</option>
  <option>あり</option>
</select>

<label>シフト</label>
<input id="shift" type="text" placeholder="例：自由シフト・週1日からOK">

</div>
<div class="card">

<div class="section-title">
■ お店について
</div>

<label>お店のPR</label>
<textarea placeholder="例：未経験者大歓迎！ノルマなし・全額日払いOK・送りあり・アットホームなお店です。"></textarea>

<label>お店の雰囲気</label>
<textarea placeholder="例：スタッフ同士の仲が良く、未経験の方でも安心して働ける環境です。"></textarea>

<label>客層</label>
<input type="text" placeholder="例：20代〜50代の落ち着いたお客様が中心">

<label>在籍人数</label>
<input type="text" placeholder="例：20名">

<label>年齢層</label>
<input type="text" placeholder="例：20歳〜30歳">

</div>

<div class="card">

<div class="section-title">
■ 掲載用画像
</div>

<label>ロゴ（あれば）</label>
<input type="file" accept="image/*">

<label>店舗外観</label>
<input type="file" accept="image/*">

<label>店内写真</label>
<input type="file" accept="image/*" multiple>

<label>求人画像（あれば）</label>
<input type="file" accept="image/*">

<small>
※現在は画像アップロード機能の準備中です。後ほどFirebase Storageと連携予定です。
</small>

</div>
<div class="card">

<div class="section-title">
■ SNS・連絡先
</div>

<label>ホームページ</label>
<input type="url" placeholder="例：https://example.com">

<label>Instagram</label>
<input type="url" placeholder="例：https://www.instagram.com/nox_shinjuku">

<label>TikTok</label>
<input type="url" placeholder="例：https://www.tiktok.com/@nox_shinjuku">

<label>X（Twitter）</label>
<input type="url" placeholder="例：https://x.com/nox_shinjuku">

<label>公式LINE</label>
<input type="url" placeholder="例：https://lin.ee/xxxxxxxx">

<label>応募用電話番号</label>
<input type="tel" placeholder="例：03-1234-5678">

</div>

<div class="card">

<div class="section-title">
■ 担当者様
</div>

<label>ご担当者名</label>
<input type="text" placeholder="例：山田">

<label>ご連絡先</label>
<input type="text" placeholder="例：090-1234-5678 または メールアドレス">

</div>

<button type="button" onclick="submitJob()">
📤 掲載申請する
</button>

<br><br>

<div style="text-align:center;color:#888;font-size:14px;line-height:1.8;">
掲載申請後、NOX運営にて内容を確認し、<br>
承認完了後に求人ページへ公開されます。
</div>
<script>
async function submitJob() {

    const data = {

        storeName: document.getElementById("storeName").value,

        businessType:
            document.getElementById("businessType").value === "その他"
            ? document.getElementById("otherBusinessType").value
            : document.getElementById("businessType").value,

        area: document.getElementById("area").value,
        address: document.getElementById("address").value,
        station: document.getElementById("station").value,
        businessHours: document.getElementById("businessHours").value,
        closedDay: document.getElementById("closedDay").value,

        salary: document.getElementById("salary").value,
        back: document.getElementById("back").value,
        dailyPay: document.getElementById("dailyPay").value,
        trial: document.getElementById("trial").value,
        beginner: document.getElementById("beginner").value,
        age: document.getElementById("age").value,
        quota: document.getElementById("quota").value,
        penalty: document.getElementById("penalty").value,
        shift: document.getElementById("shift").value,
                shopPR: document.querySelectorAll("textarea")[0].value,
        atmosphere: document.querySelectorAll("textarea")[1].value,
        customerBase: document.querySelector('input[placeholder*="20代〜50代"]').value,
        staffCount: document.querySelector('input[placeholder*="20名"]').value,
        ageGroup: document.querySelector('input[placeholder*="20歳〜30歳"]').value,

        createdAt: serverTimestamp(),
        status: "pending"
    };

    try {

        await addDoc(
            collection(db, "jobApplications"),
            data
        );

        alert("掲載申請を受け付けました！");

    } catch (e) {

        console.error(e);
        alert("送信に失敗しました。");

    }

}

function toggleOtherBusiness() {

    const businessType = document.getElementById("businessType").value;
    const otherInput = document.getElementById("otherBusinessType");

    if (businessType === "その他") {
        otherInput.style.display = "block";
    } else {
        otherInput.style.display = "none";
        otherInput.value = "";
    }

}
</script>

</body>
</html>
