<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理者ページ | NOX</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body class="register-body">
  <main class="register-page">
    <section class="register-section">
      <div class="register-card">

        <div class="register-step">
          <span>NOX ADMIN</span>
          <h2>管理者ページ</h2>
          <p>ユーザー管理</p>
        </div>
     <div style="margin:30px 0;">

  <h2 style="color:#f5d36b;">
🏪 店舗掲載申請一覧
</h2>

<p style="color:#bbb;margin-bottom:15px;">
店舗から届いた掲載申請を確認・承認できます。
</p>

  <div id="jobApplicationList">
    <p>求人申請を読み込み中...</p>
  </div>

</div>
        </div>

<div style="margin-top:40px;">

  <h2 style="color:#f5d36b;">
    👩 会員登録した女の子一覧
  </h2>

  <p style="color:#bbb;margin-bottom:15px;">
    NOXに会員登録している女の子を確認できます。
  </p>

</div>

<div id="userList">
    <p>読み込み中...</p>
</div>

        <div class="header-actions">
          <a href="../index.html" class="btn ghost">トップへ戻る</a>
          <a href="./mypage.html" class="btn ghost">マイページ</a>
        </div>

      </div>
    </section>
  </main>

<script type="module">

import { auth } from "../firebase.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  collection,
  getDocs,
  doc,
  getDoc,
  updateDoc,
deleteDoc,
addDoc,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const db = getFirestore();
const userList = document.getElementById("userList");
const jobApplicationList = document.getElementById("jobApplicationList");
onAuthStateChanged(auth, async (user) => {

  if (!user) {
    alert("ログインしてください");
    location.href = "./login.html";
    return;
  }

  const adminRef = doc(db,"users",user.uid);
  const adminSnap = await getDoc(adminRef);

  if(!adminSnap.exists() || adminSnap.data().role !== "admin"){
    alert("管理者のみアクセスできます");
    location.href="./mypage.html";
    return;
  }

 loadUsers();
loadJobApplications();

});
  async function loadUsers() {
  const snap = await getDocs(collection(db, "users"));

  userList.innerHTML = "";

  if (snap.empty) {
    userList.innerHTML = "<p>ユーザーがいません。</p>";
    return;
  }

  snap.forEach((userDoc) => {
    const data = userDoc.data();
    const uid = userDoc.id;

    const name = data.name || data.nickname || "名前未設定";
    const email = data.email || "メールなし";
    const status = data.status || "active";
    const role = data.role || "user";

    const card = document.createElement("div");
    card.style.cssText = `
      border:1px solid rgba(201,163,74,.5);
      border-radius:18px;
      padding:16px;
      margin:16px 0;
      background:#111;
      color:white;
    `;

    card.innerHTML = `
      <h3 style="color:#f5d36b;margin:0 0 8px;">${name}</h3>
      <p>📧 ${email}</p>
      <p>🔑 権限：${role}</p>
      <p>📍 状態：${status === "blocked" ? "🚫 ブロック中" : "✅ 利用中"}</p>

      <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;">
        <button class="gold-btn detailBtn" data-id="${uid}">
          詳細を見る
        </button>

        <button class="gold-btn blockBtn" data-id="${uid}" data-status="${status}">
  ${status === "blocked" ? "ブロック解除" : "ブロックする"}
</button>

<button class="gold-btn deleteBtn" data-id="${uid}" data-email="${email}">
  🗑️ 削除
</button>
      </div>
    `;

    userList.appendChild(card);
  });

  setUserButtons();
}
  function setUserButtons() {
    document.querySelectorAll(".deleteBtn").forEach((btn) => {
  btn.addEventListener("click", async () => {
    const uid = btn.dataset.id;
    const email = btn.dataset.email;

    const ok = confirm(`${email} を完全に削除しますか？\nこの操作は元に戻せません。`);
    if (!ok) return;

    await deleteDoc(doc(db, "users", uid));

    alert("ユーザーを削除しました");
    loadUsers();
  });
});
  document.querySelectorAll(".blockBtn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const uid = btn.dataset.id;
      const currentStatus = btn.dataset.status;
      const newStatus = currentStatus === "blocked" ? "active" : "blocked";

      await updateDoc(doc(db, "users", uid), {
        status: newStatus
      });

      alert(newStatus === "blocked" ? "ブロックしました" : "ブロック解除しました");
      loadUsers();
    });
  });

  document.querySelectorAll(".detailBtn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      const uid = btn.dataset.id;
      const snap = await getDoc(doc(db, "users", uid));

      if (!snap.exists()) {
        alert("ユーザーが見つかりません");
        return;
      }

      const data = snap.data();

      alert(`
名前: ${data.name || data.nickname || "未設定"}

メール:
${data.email || "-"}

電話:
${data.phone || "-"}

エリア:
${data.area || "-"}

職種:
${data.jobType || "-"}

希望給与:
${data.salary || "-"}

経験:
${data.experience || "-"}

身長:
${data.height || "-"}

体型:
${data.bodyType || "-"}

お酒:
${data.alcohol || "-"}

勤務希望:
${data.workDays || "-"}

自己紹介:
${data.selfPr || "-"}

SNS:
${data.sns || "-"}
`);
    });
  });
}
  async function loadJobApplications() {

  const snap = await getDocs(collection(db, "jobApplications"));

  jobApplicationList.innerHTML = "";

  if (snap.empty) {
    jobApplicationList.innerHTML = "<p>求人申請はありません。</p>";
    return;
  }

  snap.forEach((jobDoc) => {

    const data = jobDoc.data();

    const card = document.createElement("div");

    card.style.cssText = `
      border:1px solid rgba(201,163,74,.5);
      border-radius:18px;
      padding:16px;
      margin:16px 0;
      background:#111;
      color:white;
    `;

    card.innerHTML = `
      <h3 style="color:#f5d36b;">
        ${data.storeName || "店舗名なし"}
      </h3>

      <p>職種：${data.jobType || "-"}</p>
      <p>勤務地：${data.area || "-"}</p>
      <p>時給：${data.salary || "-"}</p>

      <button
  class="gold-btn approveBtn"
  data-id="${jobDoc.id}">
  ✅ 承認する
</button>
    `;

    jobApplicationList.appendChild(card);

  });
document.querySelectorAll(".approveBtn").forEach((btn) => {

  btn.addEventListener("click", async () => {

    const jobId = btn.dataset.id;

    const ok = confirm("この求人を承認して公開しますか？");

    if (!ok) return;

    await updateDoc(
  doc(db, "jobApplications", jobId),
  {
    status: "approved",
    approvedAt: serverTimestamp()
  }
);

const approvedSnap = await getDoc(
  doc(db, "jobApplications", jobId)
);

if (!approvedSnap.exists()) {
  alert("求人データが見つかりません");
  return;
}

const approvedData = approvedSnap.data();

await addDoc(collection(db, "jobs"), {
  ...approvedData,
  sourceApplicationId: jobId,
  status: "approved",
  approvedAt: serverTimestamp(),
  createdAt: approvedData.createdAt || serverTimestamp()
});

alert("承認しました");

loadJobApplications();

  });

});
}
  </script>

</body>
</html>
