<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>店舗アカウント登録 | NOX</title>

  <meta
    name="description"
    content="NOX店舗専用アカウントの登録ページです。"
  >

  <meta
    name="theme-color"
    content="#050505"
  >

  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
      background:
        radial-gradient(
          circle at top,
          rgba(214,168,79,.2),
          transparent 38%
        ),
        linear-gradient(
          180deg,
          #080808,
          #000
        );
      color:#fff;
      font-family:
        Arial,
        "Hiragino Kaku Gothic ProN",
        Meiryo,
        sans-serif;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    button,
    input{
      font:inherit;
    }

    button{
      -webkit-tap-highlight-color:transparent;
    }

    .page{
      width:100%;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:34px 18px;
    }

    .register-card{
      width:100%;
      max-width:560px;
      border:1px solid rgba(214,168,79,.42);
      border-radius:28px;
      padding:34px;
      background:
        radial-gradient(
          circle at top right,
          rgba(214,168,79,.14),
          transparent 34%
        ),
        linear-gradient(
          160deg,
          rgba(255,255,255,.075),
          rgba(255,255,255,.025)
        );
      box-shadow:
        0 25px 70px rgba(0,0,0,.62);
      backdrop-filter:blur(12px);
    }

    .brand{
      text-align:center;
      margin-bottom:30px;
    }

    .brand-logo{
      display:inline-block;
      color:#d6a84f;
      font-size:44px;
      font-weight:900;
      letter-spacing:7px;
      line-height:1;
    }

    .brand-logo small{
      display:block;
      margin-top:10px;
      color:#aaa;
      font-size:10px;
      letter-spacing:5px;
    }

    .register-header{
      text-align:center;
      margin-bottom:28px;
    }

    .register-header span{
      display:block;
      margin-bottom:10px;
      color:#d6a84f;
      font-size:12px;
      font-weight:800;
      letter-spacing:4px;
    }

    .register-header h1{
      margin-bottom:12px;
      color:#fff;
      font-size:30px;
      line-height:1.35;
    }

    .register-header p{
      color:#aaa;
      font-size:14px;
      line-height:1.8;
    }

    .notice{
      margin-bottom:24px;
      padding:16px;
      border:1px solid rgba(214,168,79,.24);
      border-radius:15px;
      background:rgba(214,168,79,.07);
      color:#ddd;
      font-size:13px;
      line-height:1.75;
    }

    .form-group{
      margin-bottom:18px;
    }

    .form-group label{
      display:block;
      margin-bottom:8px;
      color:#d6a84f;
      font-size:13px;
      font-weight:800;
    }

    .form-group input{
      width:100%;
      min-height:56px;
      border:1px solid #353535;
      border-radius:14px;
      padding:0 16px;
      outline:none;
      background:#090909;
      color:#fff;
      font-size:16px;
      transition:.2s;
    }

    .form-group input::placeholder{
      color:#666;
    }

    .form-group input:focus{
      border-color:#d6a84f;
      box-shadow:
        0 0 0 3px rgba(214,168,79,.11);
    }

    .form-group input:read-only{
      color:#ddd;
      background:#101010;
      border-color:rgba(214,168,79,.26);
    }

    .password-wrap{
      position:relative;
    }

    .password-wrap input{
      padding-right:78px;
    }

    .password-toggle{
      position:absolute;
      top:50%;
      right:10px;
      transform:translateY(-50%);
      border:0;
      border-radius:10px;
      padding:9px 11px;
      background:#1b1b1b;
      color:#d6a84f;
      font-size:12px;
      font-weight:800;
      cursor:pointer;
    }

    .hint{
      margin-top:7px;
      color:#777;
      font-size:12px;
      line-height:1.6;
    }

    .agreement{
      display:flex;
      align-items:flex-start;
      gap:10px;
      margin:20px 0;
      color:#aaa;
      font-size:13px;
      line-height:1.7;
    }

    .agreement input{
      width:19px;
      height:19px;
      margin-top:2px;
      accent-color:#d6a84f;
      flex:0 0 auto;
    }

    .agreement a{
      color:#d6a84f;
      text-decoration:underline;
    }

    .submit-button{
      width:100%;
      min-height:60px;
      border:0;
      border-radius:16px;
      background:
        linear-gradient(
          135deg,
          #b98625,
          #f2cf6a
        );
      color:#090909;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
      transition:.25s;
    }

    .submit-button:hover{
      transform:translateY(-2px);
      filter:brightness(1.05);
    }

    .submit-button:disabled{
      opacity:.48;
      cursor:not-allowed;
      transform:none;
      filter:none;
    }

    .message{
      display:none;
      margin-top:18px;
      border-radius:14px;
      padding:14px;
      text-align:center;
      font-size:13px;
      line-height:1.7;
      overflow-wrap:anywhere;
    }

    .message.show{
      display:block;
    }

    .message.error{
      border:1px solid rgba(255,92,92,.42);
      background:rgba(120,0,0,.22);
      color:#ffadad;
    }

    .message.success{
      border:1px solid rgba(95,214,127,.42);
      background:rgba(0,100,38,.2);
      color:#a8efb9;
    }

    .message.info{
      border:1px solid rgba(214,168,79,.35);
      background:rgba(214,168,79,.08);
      color:#e8ca83;
    }

    .bottom-links{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:25px;
    }

    .bottom-link{
      border:1px solid #333;
      border-radius:999px;
      padding:11px 17px;
      color:#bbb;
      font-size:13px;
      transition:.2s;
    }

    .bottom-link:hover{
      border-color:#d6a84f;
      color:#d6a84f;
    }

    @media(max-width:600px){
      .page{
        align-items:flex-start;
        padding:20px 14px 44px;
      }

      .register-card{
        padding:27px 20px;
        border-radius:23px;
      }

      .brand-logo{
        font-size:38px;
      }

      .register-header h1{
        font-size:26px;
      }
    }
  </style>
</head>
<body>

  <div class="page">

    <div class="register-card">

      <div class="brand">
        <div class="brand-logo">
          NOX
          <small>STORE ACCOUNT</small>
        </div>
      </div>

      <div class="register-header">
        <span>STORE REGISTER</span>

        <h1>
          店舗アカウント登録
        </h1>

        <p>
          NOXの店舗専用ダッシュボードを<br>
          ご利用いただくための登録ページです。
        </p>
      </div>

      <div class="notice">
        店舗掲載が承認された店舗様のみ登録できます。<br>
        管理者から届いた専用招待URLから登録してください。
      </div>

      <form id="registerForm">

        <div class="form-group">
          <label for="storeName">
            店舗名
          </label>

          <input
            type="text"
            id="storeName"
            placeholder="店舗名"
            autocomplete="organization"
            required
            readonly
          >
        </div>

        <div class="form-group">
          <label for="ownerName">
            担当者名
          </label>

          <input
            type="text"
            id="ownerName"
            placeholder="例：山田 太郎"
            autocomplete="name"
            required
          >
        </div>

        <div class="form-group">
          <label for="email">
            メールアドレス
          </label>

          <input
            type="email"
            id="email"
            placeholder="example@gmail.com"
            autocomplete="email"
            required
          >
        </div>

        <div class="form-group">
          <label for="password">
            パスワード
          </label>

          <div class="password-wrap">

            <input
              type="password"
              id="password"
              placeholder="8文字以上"
              autocomplete="new-password"
              minlength="8"
              required
            >

            <button
              type="button"
              class="password-toggle"
              id="togglePassword"
            >
              表示
            </button>

          </div>

          <div class="hint">
            半角英数字を含む8文字以上を推奨します。
          </div>
        </div>
                <div class="agreement">

          <input
            type="checkbox"
            id="agree"
            required
          >

          <label for="agree">
            利用規約・プライバシーポリシーに同意します。
          </label>

        </div>

        <button
          class="submit-button"
          id="submitBtn"
          type="submit"
          disabled
        >
          招待情報を確認中...
        </button>

        <div
          id="message"
          class="message info show"
        >
          招待情報を確認しています...
        </div>

      </form>

      <div class="bottom-links">

        <a
          class="bottom-link"
          href="./login.html"
        >
          ログイン
        </a>

        <a
          class="bottom-link"
          href="../index.html"
        >
          トップへ戻る
        </a>

      </div>

    </div>

  </div>

  <script type="module">

    import {
      auth,
      db
    } from "./firebase.js";

    import {
      createUserWithEmailAndPassword
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      doc,
      getDoc,
      setDoc,
      updateDoc,
      serverTimestamp
    }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const params =
      new URLSearchParams(location.search);

    const inviteCode =
      params.get("invite");

    let inviteData = null;

    const form =
      document.getElementById("registerForm");

    const submitBtn =
      document.getElementById("submitBtn");

    const message =
      document.getElementById("message");
        const storeNameInput =
      document.getElementById("storeName");

    const ownerNameInput =
      document.getElementById("ownerName");

    const emailInput =
      document.getElementById("email");

    const passwordInput =
      document.getElementById("password");

    const agreeInput =
      document.getElementById("agree");

    const togglePasswordButton =
      document.getElementById("togglePassword");

    function showMessage(
      text,
      type = "info"
    ) {

      message.className =
        `message ${type} show`;

      message.textContent = text;
    }

    function disableRegistration(
      text
    ) {

      submitBtn.disabled = true;

      submitBtn.textContent =
        "登録できません";

      showMessage(
        text,
        "error"
      );
    }

    function enableRegistration() {

      submitBtn.disabled = false;

      submitBtn.textContent =
        "店舗アカウントを作成";
    }

    togglePasswordButton
      .addEventListener(
        "click",
        () => {

          const isHidden =
            passwordInput.type ===
            "password";

          passwordInput.type =
            isHidden
              ? "text"
              : "password";

          togglePasswordButton
            .textContent =
              isHidden
                ? "非表示"
                : "表示";
        }
      );

    async function checkInvite() {

      if (!inviteCode) {

        disableRegistration(
          "店舗登録用の招待コードがありません。管理者から届いた専用URLを開いてください。"
        );

        return;
      }

      showMessage(
        "招待情報を確認しています...",
        "info"
      );

      try {

        const inviteRef =
          doc(
            db,
            "storeInvites",
            inviteCode
          );

        const inviteSnap =
          await getDoc(inviteRef);
                if (!inviteSnap.exists()) {

          disableRegistration(
            "この招待URLは無効です。管理者へ確認してください。"
          );

          return;
        }

        inviteData =
          inviteSnap.data();

        if (inviteData.used === true) {

          disableRegistration(
            "この招待URLはすでに使用されています。"
          );

          return;
        }

        const invitedStoreName =
          String(
            inviteData.storeName || ""
          ).trim();

        if (!invitedStoreName) {

          disableRegistration(
            "招待情報に店舗名がありません。管理者へ確認してください。"
          );

          return;
        }

        storeNameInput.value =
          invitedStoreName;

        storeNameInput.readOnly = true;

        const invitedEmail =
          String(
            inviteData.email || ""
          ).trim();

        if (invitedEmail) {

          emailInput.value =
            invitedEmail;

          emailInput.readOnly = true;

        } else {

          emailInput.readOnly = false;
        }

        showMessage(
          "招待情報を確認しました。必要事項を入力して登録してください。",
          "success"
        );

        enableRegistration();

      } catch (error) {

        console.error(
          "招待情報の確認エラー:",
          error
        );

        disableRegistration(
          "招待情報を確認できませんでした。時間を空けて再度お試しください。"
        );
      }
    }

    form.addEventListener(
      "submit",
      async event => {

        event.preventDefault();

        if (
          !inviteData ||
          inviteData.used === true
        ) {

          disableRegistration(
            "招待URLが無効、または使用済みです。"
          );

          return;
        }
                submitBtn.disabled = true;
        submitBtn.textContent = "登録中...";

        showMessage(
          "店舗アカウントを作成しています...",
          "info"
        );

        try {

          const ownerName =
            ownerNameInput.value.trim();

          const storeName =
            storeNameInput.value.trim();

          const email =
            emailInput.value.trim();

          const password =
            passwordInput.value;

          if (!ownerName) {
            throw new Error("担当者名を入力してください");
          }

          if (!agreeInput.checked) {
            throw new Error("利用規約に同意してください");
          }

          const result =
            await createUserWithEmailAndPassword(
              auth,
              email,
              password
            );

          const uid =
            result.user.uid;

          await setDoc(
            doc(db, "users", uid),
            {
              name: ownerName,
              email: email,
              storeName: storeName,
              role: "store",
              status: "active",
              createdAt: serverTimestamp(),
              updatedAt: serverTimestamp()
            },
            {
              merge: true
            }
          );

          await setDoc(
            doc(db, "stores", uid),
            {
              ownerId: uid,
              ownerName: ownerName,
              storeName: storeName,
              email: email,
              inviteCode: inviteCode,
              sourceApplicationId:
                inviteData.sourceApplicationId || "",
              createdAt: serverTimestamp(),
              updatedAt: serverTimestamp()
            },
            {
              merge: true
            }
          );
                    await updateDoc(
            doc(
              db,
              "storeInvites",
              inviteCode
            ),
            {
              used: true,
              registeredUid: uid,
              registeredAt:
                serverTimestamp()
            }
          );

          showMessage(
            "登録が完了しました。店舗ダッシュボードへ移動します。",
            "success"
          );

          setTimeout(() => {

            location.href =
              "./store-dashboard.html";

          }, 2000);

        } catch (error) {

          console.error(
            "店舗登録エラー:",
            error
          );

          submitBtn.disabled = false;

          submitBtn.textContent =
            "店舗アカウントを作成";

          switch (error.code) {

            case "auth/email-already-in-use":

              showMessage(
                "このメールアドレスは既に登録されています。",
                "error"
              );

              break;

            case "auth/weak-password":

              showMessage(
                "パスワードは6文字以上必要です。",
                "error"
              );

              break;

            default:

              showMessage(
                error.message ||
                "店舗登録に失敗しました。",
                "error"
              );

              break;
          }
        }
      }
    );

    checkInvite();
      </script>

</body>
</html>
