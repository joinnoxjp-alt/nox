<div class="apply-box">

    <style>
        .apply-box{
            max-width:700px;
            margin:60px auto;
            padding:40px 25px;
            background:linear-gradient(180deg,#111,#080808);
            border:1px solid rgba(212,175,55,.35);
            border-radius:25px;
            box-shadow:0 0 35px rgba(212,175,55,.12);
            text-align:center;
            color:#fff;
        }

        .apply-box h2{
            color:#d4af37;
            font-size:34px;
            margin-bottom:20px;
        }

        .apply-box p{
            color:#ddd;
            line-height:1.9;
            font-size:18px;
        }

        .line-btn{
            display:inline-block;
            margin-top:30px;
            padding:18px 45px;
            background:linear-gradient(90deg,#06C755,#04b84b);
            color:#fff;
            text-decoration:none;
            font-size:22px;
            font-weight:bold;
            border-radius:999px;
            transition:.25s;
            box-shadow:0 10px 30px rgba(6,199,85,.35);
        }

        .line-btn:hover{
            transform:translateY(-3px);
        }

        .notice{
            margin-top:45px;
        }

        .notice h3{
            color:#d4af37;
            margin-bottom:20px;
        }

        .copy-box{
            background:#111;
            border:2px solid #d4af37;
            border-radius:20px;
            padding:25px;
            margin:25px auto;
            max-width:320px;
            cursor:pointer;
            transition:.25s;
        }

        .copy-box:hover{
            transform:scale(1.03);
        }

        .copy-title{
            color:#aaa;
            font-size:18px;
        }

        .copy-name{
            color:#d4af37;
            font-size:48px;
            font-weight:bold;
            letter-spacing:3px;
            margin-top:10px;
        }

        .copy-sub{
            color:#999;
            margin-top:12px;
        }

        @media(max-width:600px){

            .apply-box h2{
                font-size:28px;
            }

            .copy-name{
                font-size:42px;
            }

            .line-btn{
                width:100%;
                box-sizing:border-box;
            }

    </style>

    <h2>LINEから簡単応募</h2>

    <p>
        ご応募をご希望の方は、<br>
        下のボタンからLINEを追加してください。
    </p>

        class="line-btn"
        target="_blank"
        rel="noopener noreferrer"

<script>
function copyYuma(){

    navigator.clipboard.writeText("yuma");

    alert("『yuma』をコピーしました！");

}
</script>
