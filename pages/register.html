<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>無料会員登録 | NOX</title>
  <link rel="stylesheet" href="../style.css" />
</head>

<body class="register-body">

<header class="site-header">
  <a href="../index.html" class="header-logo">
    <span>NOX</span>
    <small>Night Opens X</small>
  </a>
  <div class="header-actions">
    <a href="../index.html" class="btn ghost">トップへ戻る</a>
  </div>
</header>

<main class="register-page">
  <section class="register-section">
    <div class="register-card">

      <div class="register-step">
        <span>STEP 01</span>
        <h2>無料会員登録</h2>
        <p>必要情報を入力してください。</p>
      </div>

      <form id="registerForm" class="nox-form">

        <label>ニックネーム
          <input id="nickname" type="text" placeholder="例：あい" required>
        </label>

        <label>生年月日
          <input id="birthDate" type="date" required>
        </label>

        <label>メールアドレス
          <input id="email" type="email" placeholder="example@nox.jp" required>
        </label>

        <label>電話番号
          <input id="phone" type="tel" placeholder="09012345678" required>
        </label>

        <label>パスワード
          <input id="password" type="password" placeholder="6文字以上" required>
        </label>

        <div class="register-step profile-step">
          <span>STEP 02</span>
          <h2>プロフィール</h2>
          <p>店舗側が参考にできる情報です。</p>
        </div>

        <div class="form-grid">

          <label>希望エリア
            <select id="area">
              <option>選択してください</option>
              <option>新宿・歌舞伎町</option>
              <option>六本木</option>
              <option>銀座</option>
              <option>池袋</option>
              <option>渋谷</option>
              <option>全国対応</option>
            </select>
          </label>

          <label>希望業種
            <select id="jobType">
              <option>選択してください</option>
              <option>キャバクラ</option>
              <option>ラウンジ</option>
              <option>ガールズバー</option>
              <option>コンカフェ</option>
              <option>高級クラブ</option>
            </select>
          </label>

          <label>希望時給
            <select id="salary">
              <option>選択してください</option>
              <option>3,000円〜</option>
              <option>5,000円〜</option>
              <option>7,000円〜</option>
              <option>10,000円〜</option>
              <option>相談したい</option>
            </select>
          </label>

          <label>経験
            <select id="experience">
              <option>選択してください</option>
              <option>未経験</option>
              <option>経験者</option>
              <option>ブランクあり</option>
            </select>
          </label>

          <label>身長
            <input id="height" type="number" placeholder="例：160">
          </label>

          <label>体型
            <select id="bodyType">
              <option>選択してください</option>
              <option>スリム</option>
              <option>普通</option>
              <option>グラマー</option>
              <option>小柄</option>
              <option>高身長</option>
            </select>
          </label>

          <label>お酒
            <select id="alcohol">
              <option>選択してください</option>
              <option>飲める</option>
              <option>少しなら飲める</option>
              <option>飲めない</option>
            </select>
          </label>

          <label>出勤希望
            <select id="workDays">
              <option>選択してください</option>
              <option>週1〜2日</option>
              <option>週3〜4日</option>
              <option>週5日以上</option>
              <option>短期・単発</option>
              <option>相談したい</option>
            </select>
          </label>

          <label class="full">顔写真（任意）
            <input id="facePhoto" type="file" accept="image/*">
          </label>

          <label class="full">自己紹介
            <textarea id="selfPr" rows="5" placeholder="自己PR・接客経験・希望条件など"></textarea>
          </label>

          <label class="full">SNS（任意）
            <input id="sns" type="text" placeholder="@username または URL">
          </label>

          <div class="full">
            <button type="submit" class="gold-btn">無料で登録する</button>
          </div>

        </div>
      </form>
    </div>
  </section>
</main>

<script type="module">
import { auth } from "../firebase.js";
import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const db = getFirestore(auth.app);
const form = document.getElementById("registerForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {
    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
    const uid = userCredential.user.uid;

    await setDoc(doc(db, "users", uid), {
      uid,
      nickname: document.getElementById("nickname").value,
      birthDate: document.getElementById("birthDate").value,
      email,
      phone: document.getElementById("phone").value,
      area: document.getElementById("area").value,
      jobType: document.getElementById("jobType").value,
      salary: document.getElementById("salary").value,
      experience: document.getElementById("experience").value,
      height: document.getElementById("height").value,
      bodyType: document.getElementById("bodyType").value,
      alcohol: document.getElementById("alcohol").value,
      workDays: document.getElementById("workDays").value,
      selfPr: document.getElementById("selfPr").value,
      sns: document.getElementById("sns").value,
      status: "pending",
      role: "user",
      createdAt: new Date().toISOString()
    });
    try {
      await fetch("https://script.google.com/macros/s/AKfycbxehsS9Nec0NRym456Nvu54ZL46jevzTEgELir80-8fU3NY-Xlq0ukdZBjBgddGsPojg/exec", {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
          name: document.getElementById("nickname").value,
          email: email
        })
      });
    } catch (notifyError) {
      console.log(notifyError);
    }
    alert("登録完了！NOXへようこそ。");
    location.href = "./mypage.html";
  } catch (error) {
    alert("エラー: " + error.message);
  }
});
</script>

</body>
</html>
