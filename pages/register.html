<script type="module">
import { auth } from "../firebase.js";

import {
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const db = getFirestore(auth.app);

const form = document.getElementById("registerForm");

/*
  https://script.google.com/macros/s/AKfycbwL3eobetCqOiS4IiPwjzuhH5Uag5zuIAtlxksn10S84WYQKKnZTribYTK43khJprIE/exec
*/
const DISCORD_NOTIFY_URL =
  "https://script.google.com/macros/s/AKfycbwL3eobetCqOiS4IiPwjzuhH5Uag5zuIAtlxksn10S84WYQKKnZTribYTK43khJprIE/exec";

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const submitButton =
    form.querySelector('button[type="submit"]');

  submitButton.disabled = true;
  submitButton.textContent = "登録処理中...";

  const nickname =
    document.getElementById("nickname").value.trim();

  const birthDate =
    document.getElementById("birthDate").value;

  const email =
    document.getElementById("email").value.trim();

  const phone =
    document.getElementById("phone").value.trim();

  const password =
    document.getElementById("password").value;

  const area =
    document.getElementById("area").value;

  const jobType =
    document.getElementById("jobType").value;

  const salary =
    document.getElementById("salary").value;

  const experience =
    document.getElementById("experience").value;

  const height =
    document.getElementById("height").value;

  const bodyType =
    document.getElementById("bodyType").value;

  const alcohol =
    document.getElementById("alcohol").value;

  const workDays =
    document.getElementById("workDays").value;

  const selfPr =
    document.getElementById("selfPr").value.trim();

  const sns =
    document.getElementById("sns").value.trim();

  const createdAt =
    new Date().toISOString();

  try {
    /*
      Firebase Authenticationへ会員登録
    */
    const userCredential =
      await createUserWithEmailAndPassword(
        auth,
        email,
        password
      );

    const uid =
      userCredential.user.uid;

    /*
      Firestoreへ会員情報を保存
    */
    await setDoc(
      doc(db, "users", uid),
      {
        uid,
        nickname,
        birthDate,
        email,
        phone,
        area,
        jobType,
        salary,
        experience,
        height,
        bodyType,
        alcohol,
        workDays,
        selfPr,
        sns,
        status: "pending",
        role: "user",
        createdAt
      }
    );

    /*
      Discord通知用データ
    */
    const notifyData = {
      type: "user_register",
      uid: uid,
      name: nickname || "未入力",
      email: email || "未入力",
      phone: phone || "未入力",
      birthDate: birthDate || "未入力",
      area: area || "未入力",
      jobType: jobType || "未入力",
      salary: salary || "未入力",
      experience: experience || "未入力",
      workDays: workDays || "未入力",
      createdAt:
        new Date().toLocaleString(
          "ja-JP",
          {
            timeZone: "Asia/Tokyo"
          }
        )
    };

    /*
      Apps Script経由でDiscordへ通知
    */
    try {
      await fetch(
        DISCORD_NOTIFY_URL,
        {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type":
              "text/plain;charset=UTF-8"
          },
          body: JSON.stringify(
            notifyData
          )
        }
      );

      /*
        ページ移動前に通信時間を確保
      */
      await new Promise((resolve) => {
        setTimeout(resolve, 1500);
      });

    } catch (notifyError) {
      console.error(
        "Discord通知エラー:",
        notifyError
      );
    }

    alert(
      "登録完了！NOXへようこそ。"
    );

    location.href =
      "./mypage.html";

  } catch (error) {
    console.error(
      "会員登録エラー:",
      error
    );

    let message =
      "登録に失敗しました。入力内容をご確認ください。";

    if (
      error.code ===
      "auth/email-already-in-use"
    ) {
      message =
        "このメールアドレスは既に登録されています。";
    }

    if (
      error.code ===
      "auth/weak-password"
    ) {
      message =
        "パスワードは6文字以上で設定してください。";
    }

    if (
      error.code ===
      "auth/invalid-email"
    ) {
      message =
        "メールアドレスの形式を確認してください。";
    }

    alert(message);

    submitButton.disabled = false;
    submitButton.textContent =
      "無料で登録する";
  }
});
</script>
