<script type="module">
import { auth, db } from "../firebase.js";

import {
  createUserWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  doc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const form = document.getElementById("registerForm");

const DISCORD_NOTIFY_URL =
  "https://script.google.com/macros/s/AKfycbwL3eobetCqOiS4IiPwjzuhH5Uag5zuIAtlxksn10S84WYQKKnZTribYTK43khJprIE/exec";

form.addEventListener("submit", async (event) => {
  event.preventDefault();

  const submitButton =
    form.querySelector('button[type="submit"]');

  submitButton.disabled = true;
  submitButton.textContent = "登録処理中...";

  const nickname =
    document.getElementById("nickname").value.trim();

  const birthDate =
    document.getElementById("birthDate").value;

  const email =
    document.getElementById("email").value.trim();

  const phone =
    document.getElementById("phone").value.trim();

  const password =
    document.getElementById("password").value;

  const area =
    document.getElementById("area").value;

  const jobType =
    document.getElementById("jobType").value;

  const salary =
    document.getElementById("salary").value;

  const experience =
    document.getElementById("experience").value;

  const height =
    document.getElementById("height").value;

  const bodyType =
    document.getElementById("bodyType").value;

  const alcohol =
    document.getElementById("alcohol").value;

  const workDays =
    document.getElementById("workDays").value;

  const selfPr =
    document.getElementById("selfPr").value.trim();

  const sns =
    document.getElementById("sns").value.trim();

  try {
    const userCredential =
      await createUserWithEmailAndPassword(
        auth,
        email,
        password
      );

    const uid =
      userCredential.user.uid;

    await setDoc(
      doc(db, "users", uid),
      {
        uid,
        nickname,
        birthDate,
        email,
        phone,
        area,
        jobType,
        salary,
        experience,
        height,
        bodyType,
        alcohol,
        workDays,
        selfPr,
        sns,
        status: "pending",
        role: "user",
        createdAt: serverTimestamp()
      }
    );

    const notifyData = {
      type: "user_register",
      uid,
      name: nickname || "未入力",
      email: email || "未入力",
      phone: phone || "未入力",
      birthDate: birthDate || "未入力",
      area: area || "未入力",
      jobType: jobType || "未入力",
      salary: salary || "未入力",
      experience: experience || "未入力",
      workDays: workDays || "未入力",
      createdAt: new Date().toLocaleString(
        "ja-JP",
        {
          timeZone: "Asia/Tokyo"
        }
      )
    };

    try {
      await fetch(
        DISCORD_NOTIFY_URL,
        {
          method: "POST",
          mode: "no-cors",
          headers: {
            "Content-Type":
              "text/plain;charset=UTF-8"
          },
          body: JSON.stringify(notifyData)
        }
      );
    } catch (notifyError) {
      console.error(
        "Discord通知エラー:",
        notifyError
      );
    }

    submitButton.textContent = "登録完了";
    submitButton.disabled = true;

    form.reset();

    const completeBox =
      document.createElement("div");

    completeBox.style.marginTop = "24px";
    completeBox.style.padding = "20px";
    completeBox.style.border =
      "1px solid #d4af37";
    completeBox.style.borderRadius = "14px";
    completeBox.style.background =
      "rgba(212, 175, 55, 0.1)";
    completeBox.style.color = "#ffffff";
    completeBox.style.textAlign = "center";
    completeBox.style.lineHeight = "1.8";

    completeBox.innerHTML = `
      <strong style="color:#d4af37;font-size:20px;">
        登録が完了しました！
      </strong>
      <br>
      NOXへの会員登録ありがとうございます。
      <br><br>
      <a
        href="../index.html"
        style="
          display:inline-block;
          padding:12px 24px;
          border-radius:999px;
          background:#d4af37;
          color:#111111;
          font-weight:bold;
          text-decoration:none;
        "
      >
        トップページへ戻る
      </a>
    `;

    form.insertAdjacentElement(
      "afterend",
      completeBox
    );

    completeBox.scrollIntoView({
      behavior: "smooth",
      block: "center"
    });

  } catch (error) {
    console.error(
      "会員登録エラー:",
      error
    );

    let message =
      "登録に失敗しました。入力内容をご確認ください。";

    if (
      error.code ===
      "auth/email-already-in-use"
    ) {
      message =
        "このメールアドレスは既に登録されています。";
    } else if (
      error.code ===
      "auth/weak-password"
    ) {
      message =
        "パスワードは6文字以上で設定してください。";
    } else if (
      error.code ===
      "auth/invalid-email"
    ) {
      message =
        "メールアドレスの形式を確認してください。";
    } else if (
      error.code ===
      "auth/network-request-failed"
    ) {
      message =
        "通信に失敗しました。電波状況を確認してください。";
    }

    alert(message);

    submitButton.disabled = false;
    submitButton.textContent =
      "無料で登録する";
  }
});
</script>
