<!DOCTYPE html>
<html lang="ja">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>保存した求人 | NOX</title>

  <link
    rel="stylesheet"
    href="../style.css?v=12"
  >

</head>

<body class="register-body">

  <main class="register-page">

    <section class="register-section">

      <div class="register-card">

        <h1 class="register-title">
          ❤️ 保存した求人
        </h1>

        <p class="register-sub">
          あなたがお気に入り登録した求人一覧です。
        </p>

        <div
          id="savedJobsList"
          style="
            display:grid;
            gap:18px;
            margin-top:30px;
          "
        >

          <p
            id="savedEmpty"
            style="
              text-align:center;
              color:#999;
              padding:40px 0;
            "
          >
            保存した求人はありません。
          </p>

        </div>

        <a
          href="../index.html"
          class="back-link"
        >
          ← トップへ戻る
        </a>

      </div>

    </section>

  </main>

  <script type="module">

import { auth } from "./firebase.js";
import { db } from "./firebase-db.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const list =
  document.getElementById(
    "savedJobsList"
  );

const empty =
  document.getElementById(
    "savedEmpty"
  );

function escapeHtml(value){
  return String(value ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function getJobImage(job){

  if(job.mainImage){
    return job.mainImage;
  }

  if(job.imageUrl){
    return job.imageUrl;
  }

  if(
    Array.isArray(job.images) &&
    job.images.length > 0
  ){
    return job.images[0];
  }

  return "../images/nox.jpg";
}

onAuthStateChanged(
  auth,
  async(user)=>{

    if(!user){

      location.href =
        "./login.html";

      return;
    }

    try{

      const userSnapshot =
        await getDoc(
          doc(
            db,
            "users",
            user.uid
          )
        );

      const userData =
        userSnapshot.exists()
          ? userSnapshot.data()
          : {};

      const savedJobIds =
        Array.isArray(
          userData.savedJobIds
        )
          ? userData.savedJobIds
          : [];

      if(savedJobIds.length === 0){

        list.innerHTML = "";

        if(empty){
          empty.style.display =
            "block";
        }

        return;
      }

      if(empty){
        empty.style.display =
          "none";
      }

      list.innerHTML = `
        <p style="color:#aaa;text-align:center;">
          保存した求人を読み込んでいます...
        </p>
      `;

      const savedJobs = [];

      for(const jobId of savedJobIds){

        const jobSnapshot =
          await getDoc(
            doc(
              db,
              "jobs",
              jobId
            )
          );

        if(jobSnapshot.exists()){

          savedJobs.push({
            id:jobSnapshot.id,
            ...jobSnapshot.data()
          });
        }
      }

      if(savedJobs.length === 0){

        list.innerHTML = "";

        if(empty){
          empty.style.display =
            "block";
        }

        return;
      }

      list.innerHTML =
        savedJobs
          .map((job)=>{

            const storeName =
              job.storeName ||
              job.shopName ||
              job.name ||
              "店舗名未設定";

            const area =
              job.area ||
              job.prefecture ||
              job.location ||
              "エリア未設定";

            const salary =
              job.salary ||
              job.salaryText ||
              job.hourlyWage ||
              "給与は詳細をご確認ください";

            const imageUrl =
              getJobImage(job);

            return `
              <div class="member-lounge-card">

                <img
                  src="${escapeHtml(imageUrl)}"
                  alt="${escapeHtml(storeName)}"
                  style="
                    width:100%;
                    height:180px;
                    object-fit:cover;
                    border-radius:14px;
                    margin-bottom:16px;
                  "
                >

                <strong>
                  ${escapeHtml(storeName)}
                </strong>

                <small>
                  📍 ${escapeHtml(area)}
                </small>

                <small
                  style="
                    margin-top:6px;
                    color:#d4af37;
                    font-size:18px;
                  "
                >
                  💰 ${escapeHtml(salary)}
                </small>

                <a
                  href="job-detail.html?id=${encodeURIComponent(job.id)}"
                  class="btn gold"
                  style="
                    margin-top:16px;
                    display:inline-flex;
                  "
                >
                  詳細を見る
                </a>

              </div>
            `;
          })
          .join("");

    }catch(error){

      console.error(
        "保存求人読み込みエラー:",
        error
      );

      list.innerHTML = `
        <p style="color:#aaa;text-align:center;">
          保存した求人を読み込めませんでした。
        </p>
      `;
    }
  }
);

</script>

</body>

</html>
