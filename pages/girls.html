<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOX | 求人一覧</title>

<link rel="stylesheet" href="../style.css">

</head>

<body class="register-body">

<main class="register-page">
<section class="register-section">

<div class="register-card">

<div class="register-step">
<span>NOX JOBS</span>
<h2>求人一覧</h2>
<p>承認済みの求人を表示しています。</p>
</div>

<div id="jobList">
<p>読み込み中...</p>
</div>

<div class="header-actions">
<a href="../index.html" class="btn ghost">トップへ戻る</a>
<a href="./mypage.html" class="btn ghost">マイページ</a>
</div>

</div>
</section>
</main>

<script type="module">

import "./firebase.js";

import {
getFirestore,
collection,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const db = getFirestore();
const jobList = document.getElementById("jobList");
  async function loadJobs(){

  jobList.innerHTML = "<p>読み込み中...</p>";

  const q = query(
    collection(db,"jobs"),
    where("status","==","approved")
  );

  const snap = await getDocs(q);

  if(snap.empty){
    jobList.innerHTML = "<p>掲載中の求人はありません。</p>";
    return;
  }

  jobList.innerHTML = "";

  snap.forEach((doc)=>{

    const data = doc.data();

    const card = document.createElement("div");

    card.style.cssText=`
      border:1px solid rgba(201,163,74,.5);
      border-radius:18px;
      padding:18px;
      margin:18px 0;
      background:#111;
      color:white;
    `;

    card.innerHTML=`
      <h3 style="color:#f5d36b;margin-bottom:8px;">
        ${data.storeName}
      </h3>

      <p>📍 ${data.area}</p>
      <p>🍸 ${data.businessType}</p>
      <p>💰 ${data.salary}</p>

      <button class="gold-btn" style="margin-top:12px;">
        詳細を見る
      </button>
    `;

    jobList.appendChild(card);

  });

}

loadJobs();
  </script>

</body>
</html>
