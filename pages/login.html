<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン | NOX</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body class="register-body">
  <main class="register-page">
    <section class="register-section">
      <div class="register-card">
        <div class="register-step">
          <span>NOX LOGIN</span>
          <h2>ログイン</h2>
          <p>登録済みのメールアドレスでログインしてください。</p>
        </div>

        <form id="loginForm" class="nox-form">
          <label>
            メールアドレス
            <input type="email" id="email" placeholder="example@nox.jp" required>
          </label>

          <label>
            パスワード
            <input type="password" id="password" placeholder="********" required>
          </label>

          <button type="submit" class="gold-btn">ログイン</button>
        </form>

        <div class="header-actions">
          <a href="../index.html" class="btn ghost">トップへ戻る</a>
        </div>
      </div>
    </section>
  </main>

  <script>
    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      localStorage.setItem("noxLogin", "true");
      location.href = "./mypage.html";
    });
  </script>
</body>
</html>
