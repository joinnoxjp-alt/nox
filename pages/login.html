<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン｜NOX</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body class="register-body">
  <main class="register-page">
    <section class="register-section">
      <div class="register-card">
        <div class="register-step">
          <span>NOX LOGIN</span>
          <h2>ログイン</h2>
          <p>登録済みのメールアドレスでログインしてください。</p>
        </div>

        <form id="loginForm" class="nox-form">
          <label>
            メールアドレス
            <input type="email" id="email" placeholder="example@nox.jp" required>
          </label>

          <label>
            パスワード
            <input type="password" id="password" placeholder="********" required>
          </label>

          <button type="submit" class="gold-btn">ログイン</button>
        </form>

        <div class="header-actions">
          <a href="../index.html" class="btn ghost">トップへ戻る</a>
        </div>
      </div>
    </section>
  </main>

<script type="module">
  import { auth } from "../firebase.js";
  import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const db = getFirestore();

  document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;

      await setDoc(doc(db, "users", user.uid), {
        email: user.email,
        role: user.email === "watabaseball00@gmail.com" ? "admin" : "user",
        status: "active",
        updatedAt: serverTimestamp()
      }, { merge: true });

      location.href = "./mypage.html";
    } catch (err) {
      alert("ログインに失敗しました：" + err.message);
    }
  });
</script>
</body>
</html>
